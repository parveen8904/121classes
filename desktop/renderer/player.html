<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Class</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      .wrap { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; }
      video { max-width: 100vw; max-height: 100vh; }
      .wm {
        position: absolute; color: rgba(255,255,255,.5); font-size: .8rem; font-weight: 600;
        font-family: system-ui, sans-serif; text-shadow: 0 1px 2px #000; pointer-events: none;
        top: 8%; left: 6%; animation: move 24s steps(1) infinite;
      }
      @keyframes move {
        0% { top: 8%; left: 6%; } 25% { top: 8%; left: 66%; }
        50% { top: 82%; left: 66%; } 75% { top: 82%; left: 6%; } 100% { top: 8%; left: 6%; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <video id="v" controls autoplay></video>
      <span class="wm" id="wm"></span>
    </div>
    <script>
      const p = new URLSearchParams(location.search);
      document.getElementById("v").src = p.get("src") || "";
      document.getElementById("wm").textContent = p.get("wm") || "";
    </script>
  </body>
</html>
