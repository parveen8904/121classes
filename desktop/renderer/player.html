<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>CA Parveen Sharma — Class</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
      /* This wrap is what goes fullscreen — so the watermark stays on top. */
      .wrap { position: relative; height: 100vh; display: flex; flex-direction: column; background: #000; }
      .stage { position: relative; flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
      video { width: 100%; height: 100%; object-fit: contain; background: #000; }
      .wm {
        position: absolute; color: rgba(255,255,255,.4); font-size: .78rem; font-weight: 500;
        text-shadow: 0 1px 2px rgba(0,0,0,.5); pointer-events: none; z-index: 3;
        top: 8%; left: 6%; animation: move 60s linear infinite;
      }
      @keyframes move {
        0% { top: 8%; left: 6%; } 25% { top: 12%; left: 62%; }
        50% { top: 78%; left: 55%; } 75% { top: 70%; left: 8%; } 100% { top: 8%; left: 6%; }
      }
      .bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: rgba(0,0,0,.85); }
      .bar button { background: rgba(255,255,255,.14); color: #fff; border: 0; border-radius: 8px; padding: 8px 12px; font-size: 1rem; font-weight: 700; cursor: pointer; min-width: 44px; }
      .bar button:hover { background: rgba(255,255,255,.26); }
      .bar input[type=range] { flex: 1; accent-color: #0d9488; }
      .time { color: #fff; font-size: .8rem; font-variant-numeric: tabular-nums; min-width: 96px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="wrap" id="wrap">
      <div class="stage" id="stage">
        <video id="v" autoplay></video>
        <span class="wm" id="wm"></span>
      </div>
      <div class="bar">
        <button id="play">⏸</button>
        <button id="back" title="Back 10s">⏪ 10</button>
        <button id="fwd" title="Forward 10s">10 ⏩</button>
        <input id="seek" type="range" min="0" max="0" value="0" step="1" />
        <span class="time" id="time">0:00 / 0:00</span>
        <button id="speed" title="Playback speed">1×</button>
        <button id="fs" title="Fullscreen">⛶</button>
      </div>
    </div>
    <script>
      const p = new URLSearchParams(location.search);
      const v = document.getElementById("v");
      v.src = p.get("src") || "";
      document.getElementById("wm").textContent = p.get("wm") || "";

      const $ = (id) => document.getElementById(id);
      const fmt = (s) => { if (!isFinite(s)) return "0:00"; const m = Math.floor(s/60), x = Math.floor(s%60); return m + ":" + String(x).padStart(2,"0"); };
      const SPEEDS = [1, 1.25, 1.5, 1.75, 2]; let si = 0;

      $("play").onclick = () => v.paused ? v.play() : v.pause();
      $("back").onclick = () => v.currentTime = Math.max(0, v.currentTime - 10);
      $("fwd").onclick  = () => v.currentTime = Math.min(v.duration || 0, v.currentTime + 10);
      $("speed").onclick = () => { si = (si + 1) % SPEEDS.length; v.playbackRate = SPEEDS[si]; $("speed").textContent = SPEEDS[si] + "×"; };
      $("fs").onclick = () => { const w = $("wrap"); if (document.fullscreenElement) document.exitFullscreen(); else w.requestFullscreen(); };
      $("stage").onclick = () => v.paused ? v.play() : v.pause();
      $("seek").oninput = (e) => v.currentTime = Number(e.target.value);

      v.addEventListener("play",  () => $("play").textContent = "⏸");
      v.addEventListener("pause", () => $("play").textContent = "▶️");
      v.addEventListener("loadedmetadata", () => { $("seek").max = v.duration || 0; });
      v.addEventListener("timeupdate", () => { $("seek").value = v.currentTime; $("time").textContent = fmt(v.currentTime) + " / " + fmt(v.duration); });
      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") { e.preventDefault(); v.paused ? v.play() : v.pause(); }
        else if (e.code === "ArrowLeft") v.currentTime = Math.max(0, v.currentTime - 10);
        else if (e.code === "ArrowRight") v.currentTime = Math.min(v.duration || 0, v.currentTime + 10);
      });
    </script>
  </body>
</html>
