# Render blueprint. In Render: New → Blueprint → point at this repo.
# (Render background workers are a paid plan, ~$7/mo. For a free/cheaper option
#  use Railway or Fly.io — see README.)
services:
  - type: worker
    name: discord-discussion-worker
    runtime: node
    rootDir: discord-worker
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
