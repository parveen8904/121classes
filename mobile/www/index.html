<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CA Parveen Sharma</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0c1413; color: #e8f0ee; font-family: system-ui, -apple-system, sans-serif; }

    <!-- Capacitor loads the live site (see capacitor.config.ts → server.url). This
         page only shows briefly if the network is slow. -->

    </div>
  </body>
